{% extends "layout.html" %}

{% block content %}

<h1>
    Clientes
</h1>

<div class="card">

    <h2>
        Novo Cliente
    </h2>

    <form method="POST">

        <input
            type="text"
            name="nome"
            placeholder="Nome"
            required
        >

        <input
            type="text"
            name="telefone"
            placeholder="Telefone"
        >

        <button type="submit">

            Cadastrar Cliente

        </button>

    </form>

</div>

<br>

<div class="grid">

{% for cliente in clientes %}

    <div class="card">

        <h2>

            {{ cliente["nome"] }}

        </h2>

        <p>

            {{ cliente["telefone"] }}

        </p>

        <br>

        <a
            href="/excluir_cliente/{{ cliente['id'] }}"
            class="btn btn-danger"
        >

            Excluir

        </a>

    </div>

{% endfor %}

</div>

{% endblock %}
